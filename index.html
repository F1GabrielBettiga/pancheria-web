<!DOCTYPE html>
<html lang="es" style="scroll-behavior: smooth;">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panchería</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="assets/js/configuracion-tailwind.js"></script>

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap"
        rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="assets/css/estilos.css">
</head>

<body class="bg-background text-on-background font-body-md text-body-md antialiased pb-24 md:pb-0 relative">

    <div id="navbar-contenedor"></div>

    <main class="pt-16 max-w-7xl mx-auto px-5 md:px-lg">

        <!-- =============================
             HERO PRINCIPAL
        ============================== -->

        <section id="inicio"
            class="mt-lg md:mt-xl rounded-[2rem] overflow-hidden relative min-h-[614px] flex items-end pb-xl px-lg bg-surface-variant group">

            <!-- Imagen -->
            <img
                id="hero-image"
                alt="Hero principal"
                class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
            />

            <!-- Overlay -->
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-transparent"></div>

            <!-- Contenido -->
            <div class="relative z-10 max-w-2xl text-on-primary">

                <!-- Etiqueta -->
                <span
                    id="hero-badge"
                    class="inline-block px-4 py-1.5 rounded-full bg-secondary-container text-on-secondary-container font-label-bold text-label-bold mb-4 shadow-sm backdrop-blur-md bg-opacity-90">
                </span>

                <!-- Título -->
                <h1
                    id="hero-title"
                    class="font-display text-display text-on-primary mb-sm leading-tight text-white drop-shadow-md">
                </h1>

                <!-- Subtítulo -->
                <p
                    id="hero-subtitle"
                    class="font-body-lg text-body-lg text-on-primary/90 mb-lg max-w-md">
                </p>

                <!-- Botón -->
                <a
                    id="hero-button"
                    class="bg-primary hover:bg-surface-tint text-on-primary font-h3 text-h3 px-8 py-4 rounded-full shadow-[0_8px_20px_rgba(183,16,42,0.4)] active:scale-95 transition-all flex items-center gap-2 w-fit">

                    <span id="hero-button-text"></span>

                    <span class="material-symbols-outlined">
                        arrow_downward
                    </span>

                </a>

            </div>

        </section>

        <!-- =============================
             MENÚ
        ============================== -->

        <section id="menu" class="mt-xl py-xl">

            <div class="flex justify-between items-end mb-lg">
                <h2 class="font-h1 text-h1 text-on-surface">Nuestro Menú</h2>
            </div>

            <div class="mb-8" id="category-filters"></div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-gutter"
                id="menu-container">
            </div>

        </section>

        <!-- =============================
             INFORMACIÓN
        ============================== -->

        <section id="informacion"
            class="my-xl min-h-[500px] grid grid-cols-1 md:grid-cols-2 gap-gutter bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/30 overflow-hidden">

            <div class="p-lg flex flex-col justify-center">

                <h2 class="font-h2 text-h2 text-on-surface mb-md">
                    Visitanos
                </h2>

                <div class="space-y-4 mb-lg">

                    <!-- Horarios -->
                    <div class="flex items-center gap-3 text-on-surface-variant font-body-md text-body-md">

                        <span class="material-symbols-outlined text-primary">
                            schedule
                        </span>

                        <div>
                            <p class="font-label-bold text-label-bold text-on-surface">
                                Horarios
                            </p>

                            <p>
                                Mar a Dom: 19:00 - 01:00 hs
                            </p>
                        </div>

                    </div>

                    <!-- Dirección -->
                    <div class="flex items-center gap-3 text-on-surface-variant font-body-md text-body-md">

                        <span class="material-symbols-outlined text-primary">
                            location_on
                        </span>

                        <div>

                            <p class="font-label-bold text-label-bold text-on-surface">
                                Dirección
                            </p>

                            <p>
                                Av. Corrientes 1234, CABA
                            </p>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Mapa -->
            <div class="h-64 md:h-auto bg-surface-variant relative">

                <iframe
                    class="w-full h-full border-0"
                    loading="lazy"
                    allowfullscreen
                    referrerpolicy="no-referrer-when-downgrade"
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3289.4796347898854!2d-58.55823122426569!3d-34.46536557300373!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95bcb020e640b3c7%3A0x6a3861217e137c76!2sCornelio%20Saavedra%201700%2C%20B1646CBD%20San%20Fernando%2C%20Provincia%20de%20Buenos%20Aires!5e0!3m2!1sen!2sar!4v1715634567890!5m2!1sen!2sar">
                </iframe>

            </div>

        </section>

    </main>

    <!-- =============================
         CARRITO FLOTANTE
    ============================== -->

    <div id="floating-cart"
        class="fixed bottom-24 md:bottom-6 left-0 right-0 z-40 flex justify-center pointer-events-none opacity-0 invisible translate-y-10 transition-all duration-300 ease-in-out">

        <div
            class="pointer-events-auto font-['Plus_Jakarta_Sans'] font-bold text-sm tracking-wide w-[90%] max-w-md rounded-2xl p-4 flex items-center justify-between bg-white/90 dark:bg-slate-900/95 backdrop-blur-md border border-slate-200 dark:border-slate-700 shadow-xl">

            <div class="flex flex-col">

                <span class="text-xs font-medium text-slate-500 dark:text-slate-400"
                    id="cart-item-count">
                    0 items
                </span>

                <span class="text-lg text-slate-900 dark:text-white"
                    id="cart-total">
                    $0
                </span>

            </div>

            <a
                class="bg-primary hover:bg-surface-tint dark:bg-brand-red dark:hover:bg-red-700 text-white px-6 py-3 rounded-xl flex items-center gap-2 active:scale-95 transition-all shadow-md"
                href="carrito.html">

                <span class="material-symbols-outlined text-[20px]">
                    shopping_cart
                </span>

                Ver carrito

            </a>

        </div>

    </div>

    <!-- =============================
         FOOTER
    ============================== -->

    <footer
        class="bg-surface-container dark:bg-slate-900 py-lg mt-xl border-t border-outline-variant/20 dark:border-slate-800">

        <div
            class="max-w-screen-xl mx-auto px-container-margin flex flex-col items-center justify-center text-on-surface-variant dark:text-slate-400">

            <span class="material-symbols-outlined text-[32px] mb-sm">
                photo_camera
            </span>

            <p class="font-label-bold text-label-bold">
                Seguinos en Instagram
            </p>

            <a
                id="instagram-link"
                href="#"
                target="_blank"
                class="font-caption text-caption mt-xs opacity-70 hover:text-primary dark:hover:text-brand-red transition-colors">

                @instagram

            </a>

        </div>

    </footer>

    <!-- =============================
         SCRIPTS
    ============================== -->

    <script src="assets/js/configuracionLocal.js"></script>
    <script src="assets/js/tema.js"></script>
    <script src="assets/js/avisos.js"></script>
    <script src="assets/js/articulos.js"></script>
    <script src="assets/js/carrito.js"></script>
    <script src="assets/js/modalExtras.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/horarioLocal.js"></script>
    <script src="assets/js/index.js"></script>

</body>

</html>
